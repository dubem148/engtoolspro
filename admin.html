<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — EngTools Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#07080f; --bg2:#0b0e18; --surface:#0f1623; --raised:#141e2e; --hover:#1a2540;
  --b1:rgba(148,163,184,.07); --b2:rgba(148,163,184,.12); --b3:rgba(148,163,184,.20);
  --teal:#2dd4bf; --blue:#60a5fa; --violet:#a78bfa; --amber:#fbbf24; --rose:#fb7185; --lime:#a3e635;
  --t1:#eef2ff; --t2:#8b9dc3; --t3:#3d4f6a;
  --body:'DM Sans',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  --r:12px; --rs:8px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--body); background:var(--bg); color:var(--t1); min-height:100vh; }
.topbar {
  height:60px; background:rgba(7,8,15,.9); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1); display:flex; align-items:center;
  padding:0 32px; gap:16px; position:sticky; top:0; z-index:100;
}
.logo-gem { width:32px; height:32px; background:var(--teal); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:700; color:#000; }
.logo-text { font-size:15px; font-weight:700; color:var(--t1); }
.admin-badge { font-size:10px; font-family:var(--mono); padding:4px 10px; border-radius:4px; background:rgba(251,113,133,.1); border:1px solid rgba(251,113,133,.25); color:var(--rose); letter-spacing:.5px; text-transform:uppercase; margin-left:8px; }
.bar-end { margin-left:auto; display:flex; gap:10px; }
.btn { padding:8px 18px; border-radius:var(--rs); border:1px solid var(--b2); background:var(--surface); color:var(--t2); font-family:var(--body); font-size:13px; cursor:pointer; transition:all .14s; }
.btn:hover { color:var(--t1); border-color:var(--b3); }
.btn-primary { background:var(--teal); color:#000; border-color:var(--teal); font-weight:600; }
.btn-primary:hover { opacity:.9; }

.main { max-width:1100px; margin:0 auto; padding:32px 24px; }
h1 { font-size:24px; font-weight:700; color:var(--t1); margin-bottom:6px; }
.sub { font-size:14px; color:var(--t2); margin-bottom:32px; }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:32px; }
.stat-card { background:var(--surface); border:1px solid var(--b1); border-radius:var(--r); padding:20px; }
.stat-label { font-size:11px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
.stat-value { font-size:28px; font-weight:700; }
.stat-sub { font-size:11px; color:var(--t3); margin-top:4px; }

.section { background:var(--surface); border:1px solid var(--b1); border-radius:var(--r); padding:24px; margin-bottom:24px; }
.section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.section-title { font-size:15px; font-weight:600; color:var(--t1); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { border-bottom:1px solid var(--b1); }
th { font-size:10px; font-family:var(--mono); color:var(--t3); text-transform:uppercase; letter-spacing:.8px; padding:8px 12px; text-align:left; font-weight:400; }
td { padding:10px 12px; border-bottom:1px solid var(--b1); color:var(--t2); }
td:first-child { color:var(--t1); }
tr:last-child td { border-bottom:none; }
.plan-chip { font-size:10px; font-family:var(--mono); padding:3px 8px; border-radius:4px; text-transform:uppercase; }
.plan-free     { background:rgba(148,163,184,.08); color:var(--t3); }
.plan-student  { background:rgba(96,165,250,.1);   color:var(--blue);   border:1px solid rgba(96,165,250,.2); }
.plan-pro      { background:rgba(45,212,191,.08);  color:var(--teal);   border:1px solid rgba(45,212,191,.15); }
.plan-team     { background:rgba(167,139,250,.1);  color:var(--violet); border:1px solid rgba(167,139,250,.2); }

.loading { text-align:center; padding:60px; color:var(--t3); font-family:var(--mono); font-size:13px; }
.error-msg { background:rgba(251,113,133,.1); border:1px solid rgba(251,113,133,.2); border-radius:var(--rs); padding:16px 20px; color:var(--rose); font-size:14px; }

@media(max-width:640px) { .stats-grid { grid-template-columns:1fr 1fr; } .main { padding:20px 16px; } th,td { padding:8px; } }
</style>
</head>
<body>

<nav class="topbar">
  <div class="logo-gem">EP</div>
  <span class="logo-text">EngTools Pro</span>
  <span class="admin-badge">Admin</span>
  <div class="bar-end">
    <button class="btn" onclick="window.location.href='/dashboard'">Dashboard</button>
    <button class="btn btn-primary" id="export-btn" onclick="exportWaitlist()">Export Waitlist CSV</button>
    <button class="btn" id="signout-btn">Sign out</button>
  </div>
</nav>

<div class="main" id="main-content">
  <div class="loading" id="loading-state">Loading admin data…</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPA_URL = 'https://jykqcothsmogauvfnuvh.supabase.co';
const SUPA_KEY = 'sb_publishable_5Pug_V5bF1a2j7AgR3h2xg_HRBVwC5J';
const supabase = createClient(SUPA_URL, SUPA_KEY);

// ── Auth guard ─────────────────────────────────────────────
const { data: { session } } = await supabase.auth.getSession();
if (!session) { window.location.href = '/login?redirect=/admin'; }

const token = session.access_token;

// ── Sign out ───────────────────────────────────────────────
document.getElementById('signout-btn').onclick = async () => {
  await supabase.auth.signOut();
  window.location.href = '/login';
};

// ── Fetch admin stats ──────────────────────────────────────
const main = document.getElementById('main-content');

try {
  const r = await fetch('/api/admin', {
    headers: { 'Authorization': 'Bearer ' + token }
  });

  if (r.status === 403) {
    main.innerHTML = `<div class="error-msg">Access denied. This dashboard is restricted to authorised administrators.</div>`;
    return;
  }

  const data = await r.json();
  if (data.error) throw new Error(data.error);

  // ── Render ─────────────────────────────────────────────
  main.innerHTML = `
    <h1>Admin Dashboard</h1>
    <p class="sub">Real-time overview of EngTools Pro</p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" style="color:var(--teal)">${data.total_users.toLocaleString()}</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Subscriptions</div>
        <div class="stat-value" style="color:var(--lime)">${data.active_subscriptions.toLocaleString()}</div>
        <div class="stat-sub">paid plans</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Monthly Revenue</div>
        <div class="stat-value" style="color:var(--amber)">$${parseFloat(data.mrr).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="stat-sub">MRR</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Annual Revenue</div>
        <div class="stat-value" style="color:var(--violet)">$${parseFloat(data.arr).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="stat-sub">ARR (projected)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Waitlist</div>
        <div class="stat-value" style="color:var(--blue)">${data.waitlist_count.toLocaleString()}</div>
        <div class="stat-sub">email signups</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reports Generated</div>
        <div class="stat-value" style="color:var(--rose)">${data.total_reports.toLocaleString()}</div>
        <div class="stat-sub">all time</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-title">Recent Payments</div>
      </div>
      ${data.recent_payments.length ? `
        <table>
          <thead><tr><th>Amount</th><th>Email</th><th>Date</th></tr></thead>
          <tbody>
            ${data.recent_payments.map(p => `
              <tr>
                <td>${p.currency} $${p.amount}</td>
                <td>${esc(p.email)}</td>
                <td>${new Date(p.created).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</td>
              </tr>`).join('')}
          </tbody>
        </table>` : `<div style="color:var(--t3);font-size:13px;padding:8px 0">No payments recorded yet.</div>`}
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-title">Recent Users</div>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Joined</th></tr></thead>
        <tbody>
          ${data.recent_users.map(u => `
            <tr>
              <td>${esc(u.full_name||'—')}</td>
              <td>${esc(u.email||'—')}</td>
              <td><span class="plan-chip plan-${u.plan||'free'}">${u.plan||'free'}</span></td>
              <td>${new Date(u.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

} catch (err) {
  main.innerHTML = `<div class="error-msg">Error loading admin data: ${esc(err.message)}</div>`;
}

// ── Export waitlist ────────────────────────────────────────
window.exportWaitlist = async () => {
  const btn = document.getElementById('export-btn');
  btn.textContent = 'Downloading…';
  btn.disabled    = true;
  try {
    const r = await fetch('/api/admin-export', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) { alert('Export failed'); return; }
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'waitlist.csv';
    a.click();
    URL.revokeObjectURL(url);
  } finally {
    btn.textContent = 'Export Waitlist CSV';
    btn.disabled    = false;
  }
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
